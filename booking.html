<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бронирование — Дом в Дюнах</title>
  <meta name="description" content="Проверьте свободные даты и отправьте заявку на бронирование Дома в Дюнах.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600&family=Tenor+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <section class="section section-center" id="booking-form">
    <div class="container">
      <span class="section-tag">бронирование</span>
      <h1 class="section-title">Проверьте свободные даты</h1>
      <p class="section-text">Занятые даты отмечены на календаре — уточните актуальность перед оплатой</p>

      <div class="booking-card">
        <div class="booking-calendar-wrap" id="availabilityCalendar" aria-label="Календарь доступности">
          <div class="acal">
            <div class="acal-head">
              <button type="button" class="acal-nav" id="acalPrev" aria-label="Предыдущий месяц">‹</button>
              <div class="acal-title" id="acalTitle"></div>
              <button type="button" class="acal-nav" id="acalNext" aria-label="Следующий месяц">›</button>
            </div>
            <div class="acal-weekdays" id="acalWeekdays"></div>
            <div class="acal-grid" id="acalGrid"></div>
            <div class="acal-legend">
              <span class="acal-legend-item"><i class="acal-dot acal-dot-free"></i>Свободно</span>
              <span class="acal-legend-item"><i class="acal-dot acal-dot-busy"></i>Занято</span>
              <span class="acal-legend-item"><i class="acal-dot acal-dot-range"></i>Выбрано</span>
            </div>
          </div>
        </div>
        <p class="booking-note">Тариф: будни — 5 000 ₽, выходные — 7 000 ₽ за ночь.</p>

        <input type="text" id="guestName" aria-label="Ваше имя" placeholder="Ваше имя" required>
        <input type="tel" id="guestPhone" aria-label="Телефон" placeholder="Телефон" required>
        <input type="email" id="guestEmail" aria-label="Электронная почта" placeholder="Электронная почта">
        <label class="booking-input-label" for="guests">Количество гостей</label>
        <input type="number" id="guests" name="guests" aria-label="Количество гостей" placeholder="Например, 2" min="1" max="12" value="2" inputmode="numeric">
        <input type="date" id="checkin" aria-label="Дата заезда">
        <input type="date" id="checkout" aria-label="Дата выезда">

        <div class="booking-price-box">
          <div class="booking-price-label">Расчет стоимости</div>
          <div class="booking-price" id="price">Выберите даты</div>
        </div>

        <label class="booking-consent">
          <input type="checkbox" id="consent" required>
          <span>Я согласен(на) на обработку персональных данных</span>
        </label>

        <button class="btn btn-primary booking-btn" type="button" onclick="submitForm()">
          Забронировать сейчас
        </button>

        <button class="btn btn-warm booking-btn" type="button" onclick="goTelegram()">
          Узнать цену в Telegram за 1 минуту
        </button>

        <div class="booking-small">
          Ответим в течение 5-10 минут • Онлайн сейчас
        </div>
      </div>

      <div style="margin-top: 22px;">
        <a href="index.html" class="btn btn-outline">← Назад на сайт</a>
      </div>
    </div>
  </section>

  <script src="booking-app.js?v=3"></script>
  <a class="floating-contact" href="https://t.me/ArendaDunaBot" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M21.32 3.48a1.08 1.08 0 0 0-1.12-.16L2.55 10.3a1.1 1.1 0 0 0 .08 2.07l4.5 1.47 1.47 4.5a1.1 1.1 0 0 0 2.07.08l6.98-17.65a1.08 1.08 0 0 0-.16-1.12 1.08 1.08 0 0 0-1.12-.16zM8.9 13.28l8.3-6.03-6.03 8.3-.47 1.23-.44-1.34a1.1 1.1 0 0 0-.7-.7l-1.34-.44.68-.26z"/>
    </svg>
    <span>Написать нам</span>
  </a>
</body>
</html>
